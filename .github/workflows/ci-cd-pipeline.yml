          var now = new Date().toLocaleString('en-IN', { timeZone: 'Asia/Kolkata' });
          var meta = '<p><b>BILLBOX</b> | Repo: ' + repo + ' | PR #' + pr + ' | Branch: ' + head + ' | Author: ' + author + ' | Generated: ' + now + '</p><hr>';
          var style = '<style>body{font-family:sans-serif;padding:20px}h2{margin-bottom:8px}.summary{margin-bottom:16px}table{border-collapse:collapse;width:100%}th,td{border:1px solid #ddd;padding:8px;font-size:13px;text-align:left}th{background:#f2f2f2}tr:nth-child(even){background:#fafafa}tr:hover{background:#f0f0f0}.total{font-weight:bold;background:#e8f4e8}</style>';

          fs.mkdirSync('reports', { recursive: true });

