name: CI/CD Multi-Stage Pipeline

on:
  pull_request:
    branches:
      - dev
      - test
      - main

# ============================================================
# GLOBAL SETTINGS
# ============================================================
env:
  NODE_VERSION: "20"
  ARTIFACT_RETENTION_DAYS: 7

jobs:

# ============================================================
# STAGE 1 — PRETTIER CHECK (Feature → Dev)
# Triggered on PRs targeting the `dev` branch
# ============================================================
  prettier-check:
    name: "Stage 1 · Prettier Check & Format"
    if: github.base_ref == 'dev'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}       # Check out the feature branch
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Prettier — check & auto-format
        id: prettier
        run: |
          echo "Running Prettier format..."
          npx prettier --write "**/*.{js,jsx,ts,tsx,css,scss,json,md}"
          echo "Prettier formatting complete."

      - name: Commit formatted code back to feature branch
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Only commit if there are actual changes
          if ! git diff --quiet; then
            git add .
            git commit -m "style: auto-format code with Prettier [skip ci]"
            git push origin HEAD:${{ github.head_ref }}
            echo "Prettier changes committed and pushed."
          else
            echo "No formatting changes needed."
          fi

      - name: Upload formatted-code artifact
        uses: actions/upload-artifact@v4
        with:
          name: prettier-formatted-code
          path: .
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}
          # Exclude noise — keep only source files
          include-hidden-files: false

# ============================================================
# STAGE 2 — ESLINT & CODE COVERAGE (Dev → Test)
# Triggered on PRs targeting the `test` branch
# ============================================================
  eslint-and-coverage:
    name: "Stage 2 · ESLint & Code Coverage"
    if: github.base_ref == 'test'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dev branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # ── ESLint ──────────────────────────────────────────────
      - name: Run ESLint
        id: eslint
        # Continue on error so we can capture the report before failing
        continue-on-error: true
        run: |
          npx eslint "**/*.{js,jsx,ts,tsx}" \
            --format json \
            --output-file eslint-report.json || true

          # Also produce a human-readable report
          npx eslint "**/*.{js,jsx,ts,tsx}" \
            --format stylish \
            --output-file eslint-report.txt || true

          # Set outcome flag for downstream steps
          if grep -q '"errorCount":[^0]' eslint-report.json; then
            echo "eslint_passed=false" >> $GITHUB_OUTPUT
          else
            echo "eslint_passed=true"  >> $GITHUB_OUTPUT
          fi

      # ── Code Coverage ────────────────────────────────────────
      - name: Run tests with code coverage
        id: coverage
        continue-on-error: true
        run: |
          npx jest \
            --coverage \
            --coverageReporters=text \
            --coverageReporters=json-summary \
            --coverageReporters=html \
            --passWithNoTests \
            2>&1 | tee coverage-summary.txt

          # Extract overall coverage % and write to output
          COVERAGE=$(node -e "
            const s = require('./coverage/coverage-summary.json');
            const pct = s.total.lines.pct;
            console.log(pct);
          " 2>/dev/null || echo "0")
          echo "coverage_pct=$COVERAGE" >> $GITHUB_OUTPUT
          echo "Coverage: $COVERAGE%"

          # Fail if below threshold (configurable — default 80%)
          THRESHOLD=80
          if (( $(echo "$COVERAGE < $THRESHOLD" | bc -l) )); then
            echo "coverage_passed=false" >> $GITHUB_OUTPUT
          else
            echo "coverage_passed=true"  >> $GITHUB_OUTPUT
          fi

      # ── Artifact: SUCCESS path ───────────────────────────────
      - name: Upload validated-code artifact (on success)
        if: steps.eslint.outputs.eslint_passed == 'true' && steps.coverage.outputs.coverage_passed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: eslint-validated-code
          path: |
            .
            !node_modules
            !coverage
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

      # ── Artifact: FAILURE path ───────────────────────────────
      - name: Upload error report artifact (on failure)
        if: steps.eslint.outputs.eslint_passed == 'false' || steps.coverage.outputs.coverage_passed == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: lint-coverage-failure-report
          path: |
            eslint-report.json
            eslint-report.txt
            coverage-summary.txt
            coverage/
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

      # ── Fail the job if checks didn't pass ───────────────────
      - name: Evaluate results
        if: steps.eslint.outputs.eslint_passed == 'false' || steps.coverage.outputs.coverage_passed == 'false'
        run: |
          echo "❌ Pipeline failed:"
          echo "   ESLint passed    : ${{ steps.eslint.outputs.eslint_passed }}"
          echo "   Coverage passed  : ${{ steps.coverage.outputs.coverage_passed }} (${{ steps.coverage.outputs.coverage_pct }}%)"
          exit 1

# ============================================================
# STAGE 3 — DEPLOY TO AWS S3 (Test → Main)
# Triggered on PRs targeting the `main` branch
# ============================================================
  deploy-to-s3:
    name: "Stage 3 · Deploy to AWS S3"
    if: github.base_ref == 'main'
    runs-on: ubuntu-latest

    # Require manual approval before deploying to production
    environment:
      name: production
      url: https://${{ vars.S3_BUCKET_NAME }}.s3-website.${{ vars.AWS_REGION }}.amazonaws.com

    steps:
      - name: Checkout test branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build        # e.g. React/Next/Vite — adjust as needed

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ vars.AWS_REGION }}

      - name: Sync build output to S3
        run: |
          aws s3 sync ./build s3://${{ vars.S3_BUCKET_NAME }} \
            --delete \
            --cache-control "public, max-age=31536000" \
            --exclude "*.html" \
            --exclude "*.json"

          # HTML & JSON — no-cache so users always get latest
          aws s3 sync ./build s3://${{ vars.S3_BUCKET_NAME }} \
            --delete \
            --cache-control "no-cache, no-store, must-revalidate" \
            --include "*.html" \
            --include "*.json"

      - name: Invalidate CloudFront cache (optional)
        if: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID != '' }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-deployment
          path: ./build
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

      - name: Deployment summary
        run: |
          echo "✅ Deployment complete!"
          echo "   Bucket : s3://${{ vars.S3_BUCKET_NAME }}"
          echo "   Region : ${{ vars.AWS_REGION }}"
          echo "   Commit : ${{ github.sha }}"
