        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage-3-reports-PR${{ github.event.pull_request.number }}
          path: reports/
          retention-days: 7

      - name: Fail if ESLint errors
        if: steps.eslint.outputs.eslint_passed == 'false'
        run: |
          echo "ESLint errors detected — Stage 3 failed"
          exit 1

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Build project
        run: npm run build

      - name: Deploy to S3
        run: |
          aws s3 sync ./dist s3://${{ vars.S3_BUCKET_NAME }} --delete
          echo "Deployed to s3://${{ vars.S3_BUCKET_NAME }}"
