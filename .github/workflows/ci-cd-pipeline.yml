name: CI/CD Multi-Stage Pipeline

on:
  pull_request:
    branches:
      - dev
      - test
      - main

env:
  NODE_VERSION: "20"

jobs:

# ============================================================
# STAGE 1 — (feature → dev)
# ============================================================
  stage-1:
    name: "Stage 1 · Prettier + ESLint + Coverage"
    if: github.base_ref == 'dev'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Prettier
        run: npx prettier --write "**/*.{js,jsx,ts,tsx,css,scss,json,md}"

      - name: Commit formatted code
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet; then
            git add .
            git commit -m "style: auto-format with Prettier"
            git push origin HEAD:${{ github.head_ref }}
          else
            echo "No formatting changes"
          fi

      - name: Run ESLint
        id: eslint
        continue-on-error: true
        run: |
          npx eslint "**/*.{ts,tsx}" --format json --output-file eslint-report.json || true
          if grep -q '"errorCount":[^0]' eslint-report.json; then
            echo "eslint_passed=false" >> $GITHUB_OUTPUT
          else
            echo "eslint_passed=true" >> $GITHUB_OUTPUT
          fi

      - name: Run tests with coverage
        continue-on-error: true
        run: npx vitest run --coverage

      - name: Generate ESLint HTML Report
        if: always()
        run: |
          node -e "
          const fs = require('fs');
          if (!fs.existsSync('eslint-report.json')) process.exit(0);
          const data = JSON.parse(fs.readFileSync('eslint-report.json','utf8'));
          const errors = data.reduce((s,f)=>s+f.errorCount,0);
          const warnings = data.reduce((s,f)=>s+f.warningCount,0);
          const files = data.filter(f=>f.messages.length>0);
          const rows = files.map(f=>{
            const path = f.filePath.replace(/.*src\//,'src/');
            const msgs = f.messages.map(m=>
              '<tr><td>'+path+'</td><td>'+m.line+':'+m.column+'</td><td>'+(m.severity===2?'Error':'Warning')+'</td><td>'+m.message.replace(/</g,'&lt;')+'</td><td>'+(m.ruleId||'N/A')+'</td></tr>'
            ).join('');
            return msgs;
          }).join('');
          const html = '<!DOCTYPE html><html><head><meta charset=UTF-8><title>ESLint Report - Stage 1</title>'
            +'<style>body{font-family:sans-serif;padding:20px}h1{margin-bottom:10px}'
            +'.summary{margin-bottom:20px;font-size:16px}'
            +'table{border-collapse:collapse;width:100%}'
            +'th,td{border:1px solid #ddd;padding:8px;text-align:left;font-size:13px}'
            +'th{background:#f2f2f2}tr:nth-child(even){background:#fafafa}'
            +'tr:hover{background:#f0f0f0}</style></head>'
            +'<body><h1>ESLint Report — Stage 1</h1>'
            +'<div class=summary>Total Errors: <b style=color:red>'+errors+'</b> &nbsp; Warnings: <b style=color:orange>'+warnings+'</b> &nbsp; Files with issues: <b>'+files.length+'</b></div>'
            +(rows ? '<table><thead><tr><th>File</th><th>Location</th><th>Severity</th><th>Message</th><th>Rule</th></tr></thead><tbody>'+rows+'</tbody></table>'
            : '<p style=color:green>✅ No ESLint issues found!</p>')
            +'</body></html>';
          fs.mkdirSync('reports',{recursive:true});
          fs.writeFileSync('reports/eslint-report.html',html);
          "

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage-1-reports-PR${{ github.event.pull_request.number }}
          path: |
            reports/
            coverage/
          retention-days: 7

      - name: Package & upload code
        run: |
          tar --exclude='.git' --exclude='node_modules' --exclude='coverage' --exclude='reports' \
            -czf /tmp/stage-1-code.tar.gz .

      - name: Upload code artifact
        uses: actions/upload-artifact@v4
        with:
          name: stage-1-code-PR${{ github.event.pull_request.number }}
          path: /tmp/stage-1-code.tar.gz
          retention-days: 7

# ============================================================
# STAGE 2 — (dev → test)
# ============================================================
  stage-2:
    name: "Stage 2 · Prettier + ESLint + Coverage"
    needs: stage-1
    if: |
      always() &&
      github.base_ref == 'test' &&
      (needs.stage-1.result == 'success' || needs.stage-1.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Download Stage 1 code
        id: download
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: stage-1-code-PR${{ github.event.pull_request.number }}
          path: /tmp

      - name: Extract artifact
        if: steps.download.outcome == 'success'
        run: tar -xzf /tmp/stage-1-code.tar.gz -C .

      - name: Fallback checkout
        if: steps.download.outcome != 'success'
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Prettier check
        run: npx prettier --check "**/*.{js,jsx,ts,tsx,css,scss,json,md}" || true

      - name: Run ESLint
        id: eslint
        continue-on-error: true
        run: |
          npx eslint "**/*.{ts,tsx}" --format json --output-file eslint-report.json || true
          if grep -q '"errorCount":[^0]' eslint-report.json; then
            echo "eslint_passed=false" >> $GITHUB_OUTPUT
          else
            echo "eslint_passed=true" >> $GITHUB_OUTPUT
          fi

      - name: Run tests with coverage
        continue-on-error: true
        run: npx vitest run --coverage

      - name: Generate ESLint HTML Report
        if: always()
        run: |
          node -e "
          const fs = require('fs');
          if (!fs.existsSync('eslint-report.json')) process.exit(0);
          const data = JSON.parse(fs.readFileSync('eslint-report.json','utf8'));
          const errors = data.reduce((s,f)=>s+f.errorCount,0);
          const warnings = data.reduce((s,f)=>s+f.warningCount,0);
          const files = data.filter(f=>f.messages.length>0);
          const rows = files.map(f=>{
            const path = f.filePath.replace(/.*src\//,'src/');
            const msgs = f.messages.map(m=>
              '<tr><td>'+path+'</td><td>'+m.line+':'+m.column+'</td><td>'+(m.severity===2?'Error':'Warning')+'</td><td>'+m.message.replace(/</g,'&lt;')+'</td><td>'+(m.ruleId||'N/A')+'</td></tr>'
            ).join('');
            return msgs;
          }).join('');
          const html = '<!DOCTYPE html><html><head><meta charset=UTF-8><title>ESLint Report - Stage 2</title>'
            +'<style>body{font-family:sans-serif;padding:20px}h1{margin-bottom:10px}'
            +'.summary{margin-bottom:20px;font-size:16px}'
            +'table{border-collapse:collapse;width:100%}'
            +'th,td{border:1px solid #ddd;padding:8px;text-align:left;font-size:13px}'
            +'th{background:#f2f2f2}tr:nth-child(even){background:#fafafa}'
            +'tr:hover{background:#f0f0f0}</style></head>'
            +'<body><h1>ESLint Report — Stage 2</h1>'
            +'<div class=summary>Total Errors: <b style=color:red>'+errors+'</b> &nbsp; Warnings: <b style=color:orange>'+warnings+'</b> &nbsp; Files with issues: <b>'+files.length+'</b></div>'
            +(rows ? '<table><thead><tr><th>File</th><th>Location</th><th>Severity</th><th>Message</th><th>Rule</th></tr></thead><tbody>'+rows+'</tbody></table>'
            : '<p style=color:green>✅ No ESLint issues found!</p>')
            +'</body></html>';
          fs.mkdirSync('reports',{recursive:true});
          fs.writeFileSync('reports/eslint-report.html',html);
          "

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage-2-reports-PR${{ github.event.pull_request.number }}
          path: |
            reports/
            coverage/
          retention-days: 7

      - name: Package & upload code
        if: steps.eslint.outputs.eslint_passed == 'true'
        run: |
          tar --exclude='.git' --exclude='node_modules' --exclude='coverage' --exclude='reports' \
            -czf /tmp/stage-2-code.tar.gz .

      - name: Upload code artifact
        if: steps.eslint.outputs.eslint_passed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: stage-2-code-PR${{ github.event.pull_request.number }}
          path: /tmp/stage-2-code.tar.gz
          retention-days: 7

# ============================================================
# STAGE 3 — (test → main)
# ============================================================
  stage-3:
    name: "Stage 3 · Prettier + ESLint + Coverage + Deploy"
    needs: stage-2
    if: |
      always() &&
      github.base_ref == 'main' &&
      (needs.stage-2.result == 'success' || needs.stage-2.result == 'skipped')
    runs-on: ubuntu-latest
    environment:
      name: prod
    steps:
      - name: Download Stage 2 code
        id: download
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: stage-2-code-PR${{ github.event.pull_request.number }}
          path: /tmp

      - name: Extract artifact
        if: steps.download.outcome == 'success'
        run: tar -xzf /tmp/stage-2-code.tar.gz -C .

      - name: Fallback checkout
        if: steps.download.outcome != 'success'
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Prettier check
        run: npx prettier --check "**/*.{js,jsx,ts,tsx,css,scss,json,md}" || true

      - name: Run ESLint
        id: eslint
        continue-on-error: true
        run: |
          npx eslint "**/*.{ts,tsx}" --format json --output-file eslint-report.json || true
          if grep -q '"errorCount":[^0]' eslint-report.json; then
            echo "eslint_passed=false" >> $GITHUB_OUTPUT
          else
            echo "eslint_passed=true" >> $GITHUB_OUTPUT
          fi

      - name: Run tests with coverage
        continue-on-error: true
        run: npx vitest run --coverage

      - name: Generate ESLint HTML Report
        if: always()
        run: |
          node -e "
          const fs = require('fs');
          if (!fs.existsSync('eslint-report.json')) process.exit(0);
          const data = JSON.parse(fs.readFileSync('eslint-report.json','utf8'));
          const errors = data.reduce((s,f)=>s+f.errorCount,0);
          const warnings = data.reduce((s,f)=>s+f.warningCount,0);
          const files = data.filter(f=>f.messages.length>0);
          const rows = files.map(f=>{
            const path = f.filePath.replace(/.*src\//,'src/');
            const msgs = f.messages.map(m=>
              '<tr><td>'+path+'</td><td>'+m.line+':'+m.column+'</td><td>'+(m.severity===2?'Error':'Warning')+'</td><td>'+m.message.replace(/</g,'&lt;')+'</td><td>'+(m.ruleId||'N/A')+'</td></tr>'
            ).join('');
            return msgs;
          }).join('');
          const html = '<!DOCTYPE html><html><head><meta charset=UTF-8><title>ESLint Report - Stage 3</title>'
            +'<style>body{font-family:sans-serif;padding:20px}h1{margin-bottom:10px}'
            +'.summary{margin-bottom:20px;font-size:16px}'
            +'table{border-collapse:collapse;width:100%}'
            +'th,td{border:1px solid #ddd;padding:8px;text-align:left;font-size:13px}'
            +'th{background:#f2f2f2}tr:nth-child(even){background:#fafafa}'
            +'tr:hover{background:#f0f0f0}</style></head>'
            +'<body><h1>ESLint Report — Stage 3</h1>'
            +'<div class=summary>Total Errors: <b style=color:red>'+errors+'</b> &nbsp; Warnings: <b style=color:orange>'+warnings+'</b> &nbsp; Files with issues: <b>'+files.length+'</b></div>'
            +(rows ? '<table><thead><tr><th>File</th><th>Location</th><th>Severity</th><th>Message</th><th>Rule</th></tr></thead><tbody>'+rows+'</tbody></table>'
            : '<p style=color:green>✅ No ESLint issues found!</p>')
            +'</body></html>';
          fs.mkdirSync('reports',{recursive:true});
          fs.writeFileSync('reports/eslint-report.html',html);
          "

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage-3-reports-PR${{ github.event.pull_request.number }}
          path: |
            reports/
            coverage/
          retention-days: 7

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Build project
        run: npm run build

      - name: Deploy to S3
        run: |
          aws s3 sync ./dist s3://${{ vars.S3_BUCKET_NAME }} --delete
          echo "✅ Deployed to s3://${{ vars.S3_BUCKET_NAME }}"
