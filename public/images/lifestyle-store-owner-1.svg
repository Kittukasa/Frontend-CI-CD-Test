<svg width="300" height="200" viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lifestyleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#8B5CF6;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="successGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:0.8" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="300" height="200" fill="url(#lifestyleGradient)" opacity="0.1"/>
  
  <!-- Modern Store Owner (Female, Gen-Z) -->
  <g transform="translate(40, 50)">
    <!-- Body -->
    <ellipse cx="50" cy="100" rx="30" ry="60" fill="#2D3748"/>
    <!-- Head -->
    <circle cx="50" cy="50" r="25" fill="#F7FAFC"/>
    <!-- Modern Hair (Bob Cut) -->
    <path d="M25 45 Q50 25 75 45 Q70 35 50 35 Q30 35 25 45" fill="#1A202C"/>
    <path d="M30 50 Q40 45 50 50 Q60 45 70 50" fill="#1A202C"/>
    <!-- Eyes -->
    <circle cx="42" cy="45" r="3" fill="#2D3748"/>
    <circle cx="58" cy="45" r="3" fill="#2D3748"/>
    <!-- Smile -->
    <path d="M42 55 Q50 62 58 55" stroke="#2D3748" stroke-width="2" fill="none"/>
    <!-- Arms -->
    <ellipse cx="20" cy="80" rx="12" ry="30" fill="#F7FAFC" transform="rotate(-15 20 80)"/>
    <ellipse cx="80" cy="80" rx="12" ry="30" fill="#F7FAFC" transform="rotate(15 80 80)"/>
  </g>
  
  <!-- Revenue Growth Overlay -->
  <g transform="translate(120, 60)">
    <!-- Holographic Chart -->
    <rect x="0" y="0" width="100" height="60" rx="8" fill="rgba(255,255,255,0.1)" stroke="url(#successGlow)" stroke-width="2" filter="url(#glow)"/>
    
    <!-- Growth Chart -->
    <g transform="translate(10, 45)">
      <rect x="0" y="10" width="6" height="5" fill="#10B981" filter="url(#glow)"/>
      <rect x="10" y="8" width="6" height="7" fill="#34D399" filter="url(#glow)"/>
      <rect x="20" y="5" width="6" height="10" fill="#6EE7B7" filter="url(#glow)"/>
      <rect x="30" y="3" width="6" height="12" fill="#A7F3D0" filter="url(#glow)"/>
      <rect x="40" y="0" width="6" height="15" fill="#D1FAE5" filter="url(#glow)"/>
      <rect x="50" y="-2" width="6" height="17" fill="#ECFDF5" filter="url(#glow)"/>
      <rect x="60" y="-5" width="6" height="20" fill="#F0FDF4" filter="url(#glow)"/>
      <rect x="70" y="-8" width="6" height="23" fill="#10B981" filter="url(#glow)"/>
    </g>
    
    <!-- Revenue Text -->
    <text x="50" y="15" text-anchor="middle" fill="#10B981" font-size="8" font-weight="bold">REVENUE +35%</text>
    <text x="50" y="25" text-anchor="middle" fill="white" font-size="12" font-weight="bold">₹8.5L</text>
  </g>
  
  <!-- Customer Insights Bubble -->
  <g transform="translate(160, 120)">
    <!-- Insight Card -->
    <rect x="0" y="0" width="80" height="50" rx="10" fill="rgba(59, 130, 246, 0.2)" stroke="#3B82F6" stroke-width="1" filter="url(#glow)"/>
    
    <!-- Customer Icons -->
    <g transform="translate(10, 15)">
      <circle cx="8" cy="8" r="6" fill="#60A5FA"/>
      <circle cx="25" cy="8" r="6" fill="#34D399"/>
      <circle cx="42" cy="8" r="6" fill="#F59E0B"/>
      <circle cx="59" cy="8" r="6" fill="#EF4444"/>
    </g>
    
    <text x="40" y="35" text-anchor="middle" fill="#3B82F6" font-size="6" font-weight="bold">2,450 Customers</text>
    <text x="40" y="43" text-anchor="middle" fill="white" font-size="5">Real-time Insights</text>
  </g>
  
  <!-- Phone with BillBox App -->
  <g transform="translate(200, 80)">
    <!-- Phone -->
    <rect x="0" y="0" width="50" height="80" rx="10" fill="#1F2937" stroke="#3B82F6" stroke-width="1" filter="url(#glow)"/>
    <rect x="4" y="8" width="42" height="64" rx="6" fill="#111827"/>
    
    <!-- App Interface -->
    <rect x="6" y="12" width="38" height="12" rx="2" fill="url(#lifestyleGradient)"/>
    <text x="25" y="20" text-anchor="middle" fill="white" font-size="5" font-weight="bold">BillBox</text>
    
    <!-- Dashboard Elements -->
    <rect x="8" y="28" width="16" height="12" rx="2" fill="#10B981" opacity="0.8"/>
    <text x="16" y="36" text-anchor="middle" fill="white" font-size="4">₹8.5L</text>
    
    <rect x="26" y="28" width="16" height="12" rx="2" fill="#3B82F6" opacity="0.8"/>
    <text x="34" y="36" text-anchor="middle" fill="white" font-size="4">2.4K</text>
    
    <!-- Mini Chart -->
    <g transform="translate(10, 45)">
      <rect x="0" y="8" width="2" height="4" fill="#60A5FA"/>
      <rect x="4" y="6" width="2" height="6" fill="#34D399"/>
      <rect x="8" y="4" width="2" height="8" fill="#F59E0B"/>
      <rect x="12" y="2" width="2" height="10" fill="#EF4444"/>
      <rect x="16" y="0" width="2" height="12" fill="#8B5CF6"/>
      <rect x="20" y="3" width="2" height="9" fill="#06B6D4"/>
      <rect x="24" y="1" width="2" height="11" fill="#10B981"/>
    </g>
  </g>
  
  <!-- Success Indicators -->
  <g transform="translate(250, 40)">
    <!-- Growth Arrow -->
    <circle cx="15" cy="15" r="12" fill="#10B981" filter="url(#glow)"/>
    <path d="M8 18 L15 11 L22 18 M15 11 L15 20" stroke="white" stroke-width="2" fill="none"/>
    
    <!-- Notification Badge -->
    <circle cx="15" cy="45" r="12" fill="#3B82F6" filter="url(#glow)"/>
    <rect x="11" y="41" width="8" height="8" rx="2" fill="white"/>
    <circle cx="15" cy="45" r="2" fill="#3B82F6"/>
  </g>
  
  <!-- Floating Success Elements -->
  <g opacity="0.7">
    <circle cx="30" cy="30" r="15" fill="#10B981" opacity="0.2" filter="url(#glow)"/>
    <circle cx="270" cy="160" r="20" fill="#3B82F6" opacity="0.2" filter="url(#glow)"/>
    <circle cx="150" cy="180" r="12" fill="#8B5CF6" opacity="0.3" filter="url(#glow)"/>
  </g>
  
  <!-- Success Text -->
  <text x="150" y="190" text-anchor="middle" fill="#10B981" font-size="10" font-weight="bold">Smart Business Growth</text>
</svg>
