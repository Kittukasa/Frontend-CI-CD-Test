<svg width="300" height="200" viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="whatsappGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#25D366;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#128C7E;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#075E54;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="phoneGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#34D399;stop-opacity:0.6" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="300" height="200" fill="url(#whatsappGradient)" opacity="0.1"/>
  
  <!-- Phone with WhatsApp -->
  <g transform="translate(50, 30)">
    <!-- Phone Body -->
    <rect x="0" y="0" width="100" height="140" rx="20" fill="#1F2937" stroke="url(#phoneGlow)" stroke-width="2" filter="url(#glow)"/>
    <!-- Screen -->
    <rect x="8" y="15" width="84" height="110" rx="15" fill="#000000"/>
    
    <!-- WhatsApp Header -->
    <rect x="12" y="20" width="76" height="20" rx="3" fill="#075E54"/>
    <circle cx="20" cy="30" r="6" fill="#25D366"/>
    <path d="M17 30 Q20 27 23 30 Q20 33 17 30" fill="white"/>
    <text x="30" y="32" fill="white" font-size="8" font-weight="bold">BillBox Store</text>
    <circle cx="80" cy="30" r="2" fill="white"/>
    <circle cx="75" cy="30" r="2" fill="white"/>
    <circle cx="70" cy="30" r="2" fill="white"/>
    
    <!-- Chat Messages -->
    <g transform="translate(15, 45)">
      <!-- E-Bill Message -->
      <rect x="10" y="0" width="60" height="35" rx="8" fill="#DCF8C6"/>
      <text x="40" y="10" text-anchor="middle" fill="#075E54" font-size="6" font-weight="bold">📄 Your E-Bill</text>
      <text x="40" y="18" text-anchor="middle" fill="#075E54" font-size="5">Store: BillBox Mart</text>
      <text x="40" y="25" text-anchor="middle" fill="#075E54" font-size="5">Total: ₹1,250</text>
      <text x="40" y="32" text-anchor="middle" fill="#075E54" font-size="4">Thank you! 🙏</text>
      
      <!-- Digital Receipt -->
      <rect x="5" y="40" width="70" height="25" rx="8" fill="#E3F2FD"/>
      <text x="40" y="50" text-anchor="middle" fill="#1976D2" font-size="5">🧾 Digital Receipt</text>
      <text x="40" y="57" text-anchor="middle" fill="#1976D2" font-size="4">Tap to view details</text>
      
      <!-- Loyalty Points -->
      <rect x="15" y="70" width="55" height="20" rx="8" fill="#FFF3E0"/>
      <text x="42" y="78" text-anchor="middle" fill="#F57C00" font-size="5">⭐ +50 Points Earned!</text>
      <text x="42" y="85" text-anchor="middle" fill="#F57C00" font-size="4">Total: 1,250 pts</text>
    </g>
  </g>
  
  <!-- Digital Receipt Preview -->
  <g transform="translate(170, 40)">
    <!-- Receipt Card -->
    <rect x="0" y="0" width="80" height="120" rx="10" fill="white" stroke="url(#phoneGlow)" stroke-width="1" filter="url(#glow)"/>
    
    <!-- Header -->
    <rect x="5" y="5" width="70" height="15" rx="3" fill="url(#whatsappGradient)"/>
    <text x="40" y="14" text-anchor="middle" fill="white" font-size="8" font-weight="bold">BillBox E-Receipt</text>
    
    <!-- Store Info -->
    <text x="40" y="28" text-anchor="middle" fill="#1F2937" font-size="6" font-weight="bold">BillBox Mart</text>
    <text x="40" y="36" text-anchor="middle" fill="#6B7280" font-size="4">Shop #123, Main Street</text>
    
    <!-- Items -->
    <line x1="10" y1="42" x2="70" y2="42" stroke="#E5E7EB" stroke-width="1"/>
    <text x="12" y="50" fill="#374151" font-size="4">Product A</text>
    <text x="68" y="50" text-anchor="end" fill="#374151" font-size="4">₹500</text>
    <text x="12" y="58" fill="#374151" font-size="4">Product B</text>
    <text x="68" y="58" text-anchor="end" fill="#374151" font-size="4">₹750</text>
    
    <!-- Total -->
    <line x1="10" y1="65" x2="70" y2="65" stroke="#E5E7EB" stroke-width="1"/>
    <text x="12" y="75" fill="#1F2937" font-size="5" font-weight="bold">Total</text>
    <text x="68" y="75" text-anchor="end" fill="#1F2937" font-size="5" font-weight="bold">₹1,250</text>
    
    <!-- QR Code -->
    <rect x="25" y="85" width="30" height="30" rx="3" fill="#1F2937"/>
    <rect x="28" y="88" width="24" height="24" rx="2" fill="white"/>
    <g fill="#1F2937">
      <rect x="30" y="90" width="2" height="2"/>
      <rect x="34" y="90" width="2" height="2"/>
      <rect x="38" y="90" width="2" height="2"/>
      <rect x="42" y="90" width="2" height="2"/>
      <rect x="46" y="90" width="2" height="2"/>
      <rect x="30" y="94" width="2" height="2"/>
      <rect x="38" y="94" width="2" height="2"/>
      <rect x="46" y="94" width="2" height="2"/>
      <rect x="30" y="98" width="2" height="2"/>
      <rect x="34" y="98" width="2" height="2"/>
      <rect x="42" y="98" width="2" height="2"/>
      <rect x="46" y="98" width="2" height="2"/>
      <rect x="30" y="102" width="2" height="2"/>
      <rect x="38" y="102" width="2" height="2"/>
      <rect x="42" y="102" width="2" height="2"/>
      <rect x="30" y="106" width="2" height="2"/>
      <rect x="34" y="106" width="2" height="2"/>
      <rect x="38" y="106" width="2" height="2"/>
      <rect x="46" y="106" width="2" height="2"/>
    </g>
  </g>
  
  <!-- Success Indicators -->
  <g transform="translate(260, 60)">
    <!-- Checkmark -->
    <circle cx="15" cy="15" r="12" fill="#10B981" filter="url(#glow)"/>
    <path d="M9 15 L13 19 L21 11" stroke="white" stroke-width="2" fill="none"/>
    
    <!-- Instant Delivery -->
    <circle cx="15" cy="45" r="12" fill="#3B82F6" filter="url(#glow)"/>
    <path d="M8 45 L15 40 L22 45 L15 50 Z" fill="white"/>
    
    <!-- Eco Friendly -->
    <circle cx="15" cy="75" r="12" fill="#059669" filter="url(#glow)"/>
    <path d="M10 75 Q15 70 20 75 Q15 80 10 75" fill="white"/>
  </g>
  
  <!-- Floating Elements -->
  <g opacity="0.6">
    <circle cx="30" cy="180" r="20" fill="#25D366" opacity="0.2" filter="url(#glow)"/>
    <circle cx="250" cy="30" r="15" fill="#34D399" opacity="0.3" filter="url(#glow)"/>
    <circle cx="200" cy="180" r="25" fill="#60A5FA" opacity="0.2" filter="url(#glow)"/>
  </g>
</svg>
