<svg width="300" height="200" viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="emptyGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6B7280;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#9CA3AF;stop-opacity:0.3" />
    </linearGradient>
    <filter id="sadGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="300" height="200" fill="url(#emptyGradient)"/>
  
  <!-- Business Owner (Confused) -->
  <g transform="translate(30, 60)">
    <!-- Body -->
    <ellipse cx="40" cy="80" rx="25" ry="45" fill="#374151"/>
    <!-- Head -->
    <circle cx="40" cy="40" r="20" fill="#F3F4F6"/>
    <!-- Hair -->
    <path d="M20 35 Q40 20 60 35 Q55 25 40 25 Q25 25 20 35" fill="#1F2937"/>
    <!-- Confused Eyes -->
    <path d="M30 35 Q35 30 40 35" stroke="#374151" stroke-width="2" fill="none"/>
    <path d="M40 35 Q45 30 50 35" stroke="#374151" stroke-width="2" fill="none"/>
    <!-- Frown -->
    <path d="M30 45 Q40 40 50 45" stroke="#374151" stroke-width="2" fill="none"/>
    <!-- Arms (Shrugging) -->
    <ellipse cx="15" cy="65" rx="8" ry="20" fill="#F3F4F6" transform="rotate(-30 15 65)"/>
    <ellipse cx="65" cy="65" rx="8" ry="20" fill="#F3F4F6" transform="rotate(30 65 65)"/>
  </g>
  
  <!-- Empty Dashboard/Charts -->
  <g transform="translate(120, 40)">
    <!-- Monitor Frame -->
    <rect x="0" y="0" width="140" height="100" rx="8" fill="#1F2937" stroke="#374151" stroke-width="2"/>
    <rect x="8" y="8" width="124" height="84" rx="4" fill="#111827"/>
    
    <!-- Empty Chart Area -->
    <rect x="15" y="15" width="110" height="70" rx="3" fill="#1F2937" stroke="#374151" stroke-width="1" stroke-dasharray="3,3"/>
    
    <!-- No Data Message -->
    <text x="70" y="45" text-anchor="middle" fill="#6B7280" font-size="10">NO DATA</text>
    <text x="70" y="58" text-anchor="middle" fill="#6B7280" font-size="8">AVAILABLE</text>
    
    <!-- Empty Chart Axes -->
    <line x1="25" y1="75" x2="115" y2="75" stroke="#374151" stroke-width="1"/>
    <line x1="25" y1="25" x2="25" y2="75" stroke="#374151" stroke-width="1"/>
    
    <!-- Flat Line (No Growth) -->
    <line x1="25" y1="65" x2="115" y2="65" stroke="#EF4444" stroke-width="2" stroke-dasharray="2,2"/>
    
    <!-- Monitor Stand -->
    <rect x="60" y="100" width="20" height="15" fill="#374151"/>
    <rect x="45" y="115" width="50" height="5" rx="2" fill="#374151"/>
  </g>
  
  <!-- Question Marks (Confusion) -->
  <g transform="translate(200, 120)" fill="#EF4444" opacity="0.6">
    <circle cx="15" cy="15" r="12"/>
    <path d="M10 10 Q15 5 20 10 Q15 15 15 20" stroke="white" stroke-width="2" fill="none"/>
    <circle cx="15" cy="25" r="1.5" fill="white"/>
    
    <circle cx="45" cy="25" r="10"/>
    <path d="M41 20 Q45 16 49 20 Q45 24 45 28" stroke="white" stroke-width="1.5" fill="none"/>
    <circle cx="45" cy="32" r="1" fill="white"/>
  </g>
  
  <!-- Empty Analytics Icons -->
  <g transform="translate(80, 150)" opacity="0.4">
    <!-- Empty Bar Chart -->
    <rect x="0" y="20" width="4" height="0" fill="#6B7280"/>
    <rect x="8" y="20" width="4" height="0" fill="#6B7280"/>
    <rect x="16" y="20" width="4" height="0" fill="#6B7280"/>
    <rect x="24" y="20" width="4" height="0" fill="#6B7280"/>
    <line x1="0" y1="20" x2="28" y2="20" stroke="#6B7280" stroke-width="1"/>
    
    <!-- Empty Pie Chart -->
    <circle cx="50" cy="15" r="8" fill="none" stroke="#6B7280" stroke-width="2" stroke-dasharray="2,2"/>
    <text x="50" y="18" text-anchor="middle" fill="#6B7280" font-size="6">0%</text>
    
    <!-- Empty Trend -->
    <line x1="70" y1="20" x2="90" y2="20" stroke="#6B7280" stroke-width="2"/>
    <circle cx="70" cy="20" r="2" fill="#6B7280"/>
    <circle cx="90" cy="20" r="2" fill="#6B7280"/>
  </g>
</svg>
