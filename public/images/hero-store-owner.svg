<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="heroGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="phoneGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:0.8" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="hologram">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="400" fill="url(#heroGradient)" opacity="0.1"/>
  
  <!-- Store Owner (Young Gen-Z Style) -->
  <g transform="translate(50, 80)">
    <!-- Body -->
    <ellipse cx="80" cy="180" rx="45" ry="80" fill="#2D3748"/>
    <!-- Head -->
    <circle cx="80" cy="80" r="35" fill="#F7FAFC"/>
    <!-- Hair (Modern Style) -->
    <path d="M45 65 Q80 45 115 65 Q110 50 80 50 Q50 50 45 65" fill="#1A202C"/>
    <!-- Eyes -->
    <circle cx="70" cy="75" r="3" fill="#2D3748"/>
    <circle cx="90" cy="75" r="3" fill="#2D3748"/>
    <!-- Smile -->
    <path d="M70 85 Q80 95 90 85" stroke="#2D3748" stroke-width="2" fill="none"/>
    <!-- Arms -->
    <ellipse cx="40" cy="140" rx="15" ry="40" fill="#F7FAFC" transform="rotate(-20 40 140)"/>
    <ellipse cx="120" cy="140" rx="15" ry="40" fill="#F7FAFC" transform="rotate(20 120 140)"/>
  </g>
  
  <!-- Phone with BillBox App -->
  <g transform="translate(200, 120)">
    <!-- Phone Body -->
    <rect x="0" y="0" width="80" height="140" rx="15" fill="#1F2937" stroke="url(#phoneGlow)" stroke-width="2" filter="url(#glow)"/>
    <!-- Screen -->
    <rect x="8" y="15" width="64" height="110" rx="8" fill="#111827"/>
    
    <!-- BillBox App UI -->
    <!-- Header -->
    <rect x="12" y="20" width="56" height="15" rx="3" fill="url(#heroGradient)"/>
    <text x="40" y="30" text-anchor="middle" fill="white" font-size="6" font-family="Arial">BillBox</text>
    
    <!-- Stats Cards -->
    <rect x="12" y="40" width="25" height="20" rx="3" fill="#3B82F6" opacity="0.8"/>
    <text x="24" y="48" text-anchor="middle" fill="white" font-size="4">₹8.5L</text>
    <text x="24" y="55" text-anchor="middle" fill="white" font-size="3">Revenue</text>
    
    <rect x="43" y="40" width="25" height="20" rx="3" fill="#8B5CF6" opacity="0.8"/>
    <text x="55" y="48" text-anchor="middle" fill="white" font-size="4">2,450</text>
    <text x="55" y="55" text-anchor="middle" fill="white" font-size="3">Customers</text>
    
    <!-- Chart -->
    <g transform="translate(15, 70)">
      <rect x="0" y="15" width="4" height="25" fill="#60A5FA"/>
      <rect x="8" y="10" width="4" height="30" fill="#34D399"/>
      <rect x="16" y="20" width="4" height="20" fill="#F59E0B"/>
      <rect x="24" y="5" width="4" height="35" fill="#EF4444"/>
      <rect x="32" y="12" width="4" height="28" fill="#8B5CF6"/>
      <rect x="40" y="8" width="4" height="32" fill="#06B6D4"/>
    </g>
  </g>
  
  <!-- Holographic Receipts -->
  <g transform="translate(320, 60)" filter="url(#hologram)">
    <!-- Receipt 1 -->
    <rect x="0" y="0" width="60" height="80" rx="5" fill="white" opacity="0.7" stroke="#3B82F6" stroke-width="1"/>
    <line x1="5" y1="10" x2="55" y2="10" stroke="#3B82F6" stroke-width="1"/>
    <line x1="5" y1="20" x2="45" y2="20" stroke="#6B7280" stroke-width="0.5"/>
    <line x1="5" y1="30" x2="50" y2="30" stroke="#6B7280" stroke-width="0.5"/>
    <line x1="5" y1="40" x2="40" y2="40" stroke="#6B7280" stroke-width="0.5"/>
    <text x="30" y="65" text-anchor="middle" fill="#3B82F6" font-size="8" font-weight="bold">DIGITAL</text>
    
    <!-- Receipt 2 -->
    <rect x="40" y="20" width="60" height="80" rx="5" fill="white" opacity="0.6" stroke="#8B5CF6" stroke-width="1"/>
    <line x1="45" y1="30" x2="95" y2="30" stroke="#8B5CF6" stroke-width="1"/>
    <line x1="45" y1="40" x2="85" y2="40" stroke="#6B7280" stroke-width="0.5"/>
    <line x1="45" y1="50" x2="90" y2="50" stroke="#6B7280" stroke-width="0.5"/>
    <line x1="45" y1="60" x2="80" y2="60" stroke="#6B7280" stroke-width="0.5"/>
    <text x="70" y="85" text-anchor="middle" fill="#8B5CF6" font-size="8" font-weight="bold">E-BILL</text>
    
    <!-- Receipt 3 -->
    <rect x="80" y="40" width="60" height="80" rx="5" fill="white" opacity="0.5" stroke="#06B6D4" stroke-width="1"/>
    <line x1="85" y1="50" x2="135" y2="50" stroke="#06B6D4" stroke-width="1"/>
    <line x1="85" y1="60" x2="125" y2="60" stroke="#6B7280" stroke-width="0.5"/>
    <line x1="85" y1="70" x2="130" y2="70" stroke="#6B7280" stroke-width="0.5"/>
    <line x1="85" y1="80" x2="120" y2="80" stroke="#6B7280" stroke-width="0.5"/>
    <text x="110" y="105" text-anchor="middle" fill="#06B6D4" font-size="8" font-weight="bold">SMART</text>
  </g>
  
  <!-- Floating Analytics Icons -->
  <g transform="translate(450, 100)">
    <!-- Analytics Circle -->
    <circle cx="20" cy="20" r="15" fill="#10B981" opacity="0.8" filter="url(#glow)"/>
    <path d="M12 20 L16 16 L20 18 L24 14 L28 16" stroke="white" stroke-width="2" fill="none"/>
    
    <!-- WhatsApp Icon -->
    <circle cx="60" cy="60" r="15" fill="#25D366" opacity="0.8" filter="url(#glow)"/>
    <path d="M52 60 Q60 52 68 60 Q60 68 52 60" fill="white"/>
    
    <!-- Revenue Icon -->
    <circle cx="30" cy="80" r="15" fill="#F59E0B" opacity="0.8" filter="url(#glow)"/>
    <text x="30" y="85" text-anchor="middle" fill="white" font-size="12" font-weight="bold">₹</text>
  </g>
  
  <!-- Glow Effects -->
  <circle cx="250" cy="200" r="100" fill="url(#phoneGlow)" opacity="0.1" filter="url(#glow)"/>
  <circle cx="400" cy="150" r="80" fill="#34D399" opacity="0.1" filter="url(#glow)"/>
</svg>
